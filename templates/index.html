<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB99 — ESP32 Live Inspector</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #00ff00;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    padding: 16px;
  }

  header {
    border-bottom: 1px solid #00ff00;
    padding-bottom: 10px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
  }

  header h1 { font-size: 1.4em; letter-spacing: 2px; }

  #status {
    font-size: 0.85em;
    padding: 3px 10px;
    border: 1px solid;
    border-radius: 3px;
  }
  #status.connected    { color: #00ff00; border-color: #00ff00; }
  #status.disconnected { color: #ff3333; border-color: #ff3333; }
  #status.error        { color: #ffaa00; border-color: #ffaa00; }

  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }

  .meta-cell {
    background: #0a0a0a;
    border: 1px solid #1a4d1a;
    padding: 6px 12px;
    flex: 1 1 160px;
  }

  .meta-cell .label { color: #00aa00; font-size: 0.75em; display: block; margin-bottom: 2px; }
  .meta-cell .value { color: #00ff00; word-break: break-all; }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    background: #050505;
    border: 1px solid #1a4d1a;
  }

  .panel-title {
    background: #0a1a0a;
    color: #00aa00;
    font-size: 0.75em;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-bottom: 1px solid #1a4d1a;
  }

  .panel pre {
    padding: 10px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 320px;
    overflow-y: auto;
    color: #00ff00;
    line-height: 1.5;
  }

  .panel pre.error { color: #ff4444; }
  .panel pre.muted { color: #336633; font-style: italic; }

  #counter { color: #00aa00; font-size: 0.8em; }
</style>
</head>
<body>

<header>
  <h1>WB99 — UNIVERSAL ESP32 INSPECTOR</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span id="counter">received: 0</span>
    <span id="status" class="disconnected">DISCONNECTED</span>
  </div>
</header>

<div class="meta-row">
  <div class="meta-cell"><span class="label">TIMESTAMP</span><span class="value" id="m-ts">—</span></div>
  <div class="meta-cell"><span class="label">METHOD</span><span class="value" id="m-method">—</span></div>
  <div class="meta-cell"><span class="label">CONTENT-TYPE</span><span class="value" id="m-ct">—</span></div>
  <div class="meta-cell"><span class="label">BODY LENGTH</span><span class="value" id="m-len">—</span></div>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-title">RAW BODY</div>
    <pre id="p-raw" class="muted">waiting for data…</pre>
  </div>
  <div class="panel">
    <div class="panel-title">PARSED JSON</div>
    <pre id="p-json" class="muted">will appear if payload is valid JSON</pre>
  </div>
</div>

<div class="panel">
  <div class="panel-title">HEADERS</div>
  <pre id="p-headers" class="muted">waiting for data…</pre>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const socket = io({ reconnectionDelay: 1000, reconnectionDelayMax: 5000 });
  let count = 0;

  const el = id => document.getElementById(id);
  const setStatus = (text, cls) => {
    const s = el('status');
    s.textContent = text;
    s.className = cls;
  };

  socket.on('connect',       () => setStatus('CONNECTED', 'connected'));
  socket.on('disconnect',    () => setStatus('DISCONNECTED', 'disconnected'));
  socket.on('connect_error', () => setStatus('RETRYING…', 'error'));

  socket.on('new_data', d => {
    el('counter').textContent = `received: ${++count}`;

    el('m-ts').textContent     = d.timestamp    || '—';
    el('m-method').textContent = d.method       || '—';
    el('m-ct').textContent     = d.content_type || '—';
    el('m-len').textContent    = d.body_length != null ? d.body_length + ' bytes' : '—';

    // Raw body
    const raw = el('p-raw');
    raw.className = '';
    raw.textContent = d.raw_body || '(empty body)';

    // Parsed JSON
    const pj = el('p-json');
    if (d.parsed_json !== null && d.parsed_json !== undefined) {
      pj.className = '';
      pj.textContent = JSON.stringify(d.parsed_json, null, 2);
    } else {
      pj.className = 'error';
      pj.textContent = d.parse_error ? `Parse error: ${d.parse_error}` : 'Not valid JSON';
    }

    // Headers
    el('p-headers').className = '';
    el('p-headers').textContent = JSON.stringify(d.headers, null, 2);
  });
</script>
</body>
</html>
